<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipping Hub</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent-afl: #003087;
      --accent-afl-light: #0052cc;
      --accent-nrl: #1a1a2e;
      --accent-nrl-light: #e63946;
      --text: #e8eaf6;
      --text-muted: #8b92b3;
      --win: #22c55e;
      --loss: #ef4444;
      --tip: #f59e0b;
      --tip-bg: rgba(245,158,11,0.12);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--tip); }

    .league-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
    }

    .league-btn {
      padding: 6px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-muted);
    }

    .league-btn.active-afl { background: var(--accent-afl-light); color: #fff; }
    .league-btn.active-nrl { background: var(--accent-nrl-light); color: #fff; }

    /* ── Layout ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Round selector ── */
    .round-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .round-bar h2 { font-size: 1.1rem; font-weight: 700; flex: 1; }

    .round-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
    }

    .round-nav button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .round-nav button:hover { color: var(--text); }

    .round-nav span {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 70px;
      text-align: center;
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-size: 1.7rem; font-weight: 800; margin-top: 2px; }
    .stat-value.green { color: var(--win); }
    .stat-value.amber { color: var(--tip); }

    /* ── Match cards ── */
    .matches { display: flex; flex-direction: column; gap: 12px; }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      transition: border-color 0.2s;
    }

    .match-card:hover { border-color: #3d4470; }

    .match-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .match-teams {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 8px;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .team:hover { background: var(--surface2); }

    .team.tipped {
      border-color: var(--tip);
      background: var(--tip-bg);
    }

    .team.tipped .team-name { color: var(--tip); }

    .team-logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
    }

    .team-name {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }

    .team-odds {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .vs {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 0 4px;
      flex-shrink: 0;
    }

    .match-result {
      margin-top: 12px;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .match-result.correct { color: var(--win); }
    .match-result.incorrect { color: var(--loss); }
    .match-result.pending { color: var(--text-muted); }

    .score-badge {
      display: inline-block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* ── Leaderboard ── */
    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .sidebar-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-card h3 .icon { font-size: 1.2rem; }

    .leaderboard { display: flex; flex-direction: column; gap: 10px; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      transition: background 0.15s;
    }

    .lb-row:hover { background: #272b42; }

    .lb-rank {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text-muted);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .lb-rank.gold { color: #fbbf24; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #b45309; }

    .lb-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: #fff;
      flex-shrink: 0;
    }

    .lb-info { flex: 1 }
    .lb-name { font-size: 0.85rem; font-weight: 600; }
    .lb-sub { font-size: 0.7rem; color: var(--text-muted); }

    .lb-score {
      font-size: 1rem;
      font-weight: 800;
      color: var(--win);
    }

    .lb-row.me {
      border: 1px solid var(--tip);
      background: var(--tip-bg);
    }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 20px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Tip all banner ── */
    .tip-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .tip-banner p { font-size: 0.85rem; color: var(--text-muted); }
    .tip-banner strong { display: block; font-size: 0.95rem; color: var(--text); }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover { opacity: 0.85; }
    .btn-amber { background: var(--tip); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 0.75rem; }

    /* ── Season overview ── */
    .season-card {
      margin-top: 20px;
    }

    .rounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
      gap: 6px;
      margin-top: 12px;
    }

    .round-pip {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .round-pip.done-good { background: rgba(34,197,94,0.2); color: var(--win); border-color: rgba(34,197,94,0.3); }
    .round-pip.done-ok { background: rgba(245,158,11,0.2); color: var(--tip); border-color: rgba(245,158,11,0.3); }
    .round-pip.done-bad { background: rgba(239,68,68,0.2); color: var(--loss); border-color: rgba(239,68,68,0.3); }
    .round-pip.current { background: var(--accent-afl-light); color: #fff; border-color: var(--accent-afl-light); }
    .round-pip.future { background: var(--surface2); color: var(--text-muted); }
    .round-pip:hover { opacity: 0.8; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Utility ── */
    .section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>

          </div>
          <div class="progress-bar">

      <div class="sidebar-card season-card">

        <p class="section-title">All Rounds</p>

  </div>
</div>

<div class="toast" id="toast"></div>

let tips = {};   // { matchIndex: 'home'|'away' }

// ── Helpers ───────────────────────────────────────────────────────────────
function getTeam(id) {
  return LEAGUES[league].teams.find(t => t.id === id);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Render ────────────────────────────────────────────────────────────────

  renderMatches();

function updateRoundLabel() {
  const lbl = `Round ${displayRound}`;
  document.getElementById('round-title').textContent = lbl;
  document.getElementById('round-label').textContent = lbl;

  const data = LEAGUES[league];
  const isCurrentRound = displayRound === data.currentRound;
  const banner = document.getElementById('tip-banner');
  const tipped = Object.keys(tips).filter(k => k.startsWith(league + '_r' + displayRound)).length;
  const total = data.matches.length;

  if (isCurrentRound) {
    banner.style.display = 'flex';
    banner.querySelector('strong').textContent = `Round ${displayRound} — Tips close Thursday 7:30 PM`;
    banner.querySelector('p').textContent = `${tipped} of ${total} games tipped · ${total - tipped} remaining`;
  } else {
    banner.style.display = 'none';
  }
}

function renderMatches() {
  const data = LEAGUES[league];
  const list = document.getElementById('matches-list');
  list.innerHTML = '';

  data.matches.forEach((m, i) => {
    const home = getTeam(m.home);
    const away = getTeam(m.away);
    const tipKey = `${league}_r${displayRound}_${i}`;
    const tippedSide = tips[tipKey];

    const isPast = displayRound < data.currentRound;
    const resultText = isPast
      ? (tippedSide ? (Math.random() > 0.38 ? '✓ Correct' : '✗ Incorrect') : '— Not tipped') : '';
    const resultClass = isPast
      ? (tippedSide ? (resultText.startsWith('✓') ? 'correct' : 'incorrect') : 'pending') : 'pending';

    const scoreHTML = isPast
      ? `<span class="score-badge">${Math.floor(Math.random()*60+60)} – ${Math.floor(Math.random()*60+40)}</span>`
      : '';

    list.innerHTML += `
      <div class="match-card">
        <div class="match-meta">
          <span>📍 ${m.venue}</span>
          <span>🕐 ${m.time}</span>
        </div>
        <div class="match-teams">
          <div class="team ${tippedSide === 'home' ? 'tipped' : ''}" onclick="tip(${i}, 'home')">
            <div class="team-logo" style="background:${home.color}">${home.logo}</div>
            <div class="team-name">${home.name}</div>
            <div class="team-odds">$${m.homeOdds.toFixed(2)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div class="vs">VS</div>
            ${scoreHTML}
          </div>
          <div class="team ${tippedSide === 'away' ? 'tipped' : ''}" onclick="tip(${i}, 'away')">
            <div class="team-logo" style="background:${away.color}">${away.logo}</div>
            <div class="team-name">${away.name}</div>
            <div class="team-odds">$${m.awayOdds.toFixed(2)}</div>
          </div>
        </div>
        ${isPast && resultText ? `<div class="match-result ${resultClass}">${resultText}</div>` : ''}
      </div>`;
  });
}

function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  const rankColors = ['gold', 'silver', 'bronze'];
  LEADERBOARD_DATA.forEach((p, i) => {
    const rankClass = i < 3 ? rankColors[i] : '';
    lb.innerHTML += `
      <div class="lb-row ${p.me ? 'me' : ''}">
        <div class="lb-rank ${rankClass}">${i + 1}</div>
        <div class="lb-avatar" style="background:${p.color}">${p.avatar}</div>
        <div class="lb-info">
          <div class="lb-name">${p.name}${p.me ? ' 👈' : ''}</div>
          <div class="lb-sub">Margin: ${p.margin}</div>
        </div>
        <div class="lb-score">${p.score}</div>
      </div>`;
  });
}

function renderRoundsGrid() {
  const data = LEAGUES[league];
  const grid = document.getElementById('rounds-grid');
  grid.innerHTML = '';
  for (let r = 1; r <= data.rounds; r++) {
    let cls = 'future';
    if (r === data.currentRound) cls = 'current';
    else if (r < data.currentRound) {
      const res = ROUND_RESULTS[r - 1] || { correct: 5, total: 8 };
      const pct = res.correct / res.total;
      cls = pct >= 0.75 ? 'done-good' : pct >= 0.5 ? 'done-ok' : 'done-bad';
    }
    grid.innerHTML += `<div class="round-pip ${cls}" onclick="jumpToRound(${r})" title="Round ${r}">${r}</div>`;
  }
}

// ── Interactions ──────────────────────────────────────────────────────────
function tip(matchIndex, side) {
  const tipKey = `${league}_r${displayRound}_${matchIndex}`;
  const data = LEAGUES[league];
  if (displayRound < data.currentRound) {
    showToast('This round has already been played.');
    return;
  }
  const prev = tips[tipKey];
  if (prev === side) {
    delete tips[tipKey];
    showToast('Tip removed.');
  } else {
    tips[tipKey] = side;
    const m = data.matches[matchIndex];
    const teamId = side === 'home' ? m.home : m.away;
    const team = getTeam(teamId);
    showToast(`Tipped: ${team.name} ✓`);
  }
  renderMatches();
  updateRoundLabel();
}

function autoTip() {
  const data = LEAGUES[league];
  data.matches.forEach((m, i) => {
    const tipKey = `${league}_r${displayRound}_${i}`;
    if (!tips[tipKey]) {
      tips[tipKey] = m.homeOdds <= m.awayOdds ? 'home' : 'away';
    }
  });
  showToast('Auto-tipped all favourites!');
  renderMatches();
  updateRoundLabel();
}

function changeRound(delta) {
  const data = LEAGUES[league];
  displayRound = Math.max(1, Math.min(data.rounds, displayRound + delta));
  render();
}

function jumpToRound(r) {
  displayRound = r;
  render();
}

function setLeague(l) {
  league = l;
  displayRound = LEAGUES[l].currentRound;
  tips = {};

  document.getElementById('btn-afl').className = 'league-btn' + (l === 'afl' ? ' active-afl' : '');
  document.getElementById('btn-nrl').className = 'league-btn' + (l === 'nrl' ? ' active-nrl' : '');

  // Update accent colour for round pips
  document.documentElement.style.setProperty('--accent-afl-light', l === 'nrl' ? '#e63946' : '#0052cc');

  // Update stats
  if (l === 'nrl') {
    document.getElementById('stat-correct').textContent = '49';
    document.getElementById('stat-accuracy').textContent = '61%';
    document.getElementById('stat-rank').innerHTML = '5<span style="font-size:1rem;color:var(--text-muted)">/18</span>';
    document.getElementById('stat-round').innerHTML = '4<span style="font-size:1rem;color:var(--text-muted)">/8</span>';
    document.getElementById('season-pct').textContent = '41%';
    document.getElementById('progress-fill').style.width = '41%';
  } else {
    document.getElementById('stat-correct').textContent = '57';
    document.getElementById('stat-accuracy').textContent = '67%';
    document.getElementById('stat-rank').innerHTML = '3<span style="font-size:1rem;color:var(--text-muted)">/24</span>';
    document.getElementById('stat-round').innerHTML = '5<span style="font-size:1rem;color:var(--text-muted)">/8</span>';
    document.getElementById('season-pct').textContent = '52%';
    document.getElementById('progress-fill').style.width = '52%';
  }

  render();
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
